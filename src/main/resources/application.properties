spring.application.name=dev-pr-metrics
server.port=8080

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/github?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

github.org=${GITHUB_ORG}
github.app-id=${GITHUB_APP_ID}
github.installation-id=${GITHUB_INSTALLATION_ID}
github.private-key-path=${GITHUB_PRIVATE_KEY_PATH}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

jobrunr.background-job-server.enabled=true
jobrunr.dashboard.enabled=true
jobrunr.database.skip-create=true
jobrunr.background-job-server.worker-count=1
