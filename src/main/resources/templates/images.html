<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head('Images | TailAdmin - Tailwind CSS Admin Dashboard Template')}">
    <meta charset="UTF-8" />
  </head>
  <body
    x-data="{ page: 'images', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <th:block th:replace="~{partials/preloader :: *}"></th:block>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <th:block th:replace="~{partials/sidebar :: *}"></th:block>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <th:block th:replace="~{partials/overlay :: *}"></th:block>
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <th:block th:replace="~{partials/header :: *}"></th:block>
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Images`}">
              <th:block th:replace="~{partials/breadcrumb :: *}"></th:block>
            </div>
            <!-- Breadcrumb End -->

            <div class="space-y-5 sm:space-y-6">
              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Responsive image
                  </h3>
                </div>
                <div
                  class="p-4 border-t border-gray-100 dark:border-gray-800 sm:p-6"
                >
                  <th:block th:replace="~{partials/grid-image/image-01 :: *}"></th:block>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Image in 2 Grid
                  </h3>
                </div>
                <div
                  class="p-4 border-t border-gray-100 dark:border-gray-800 sm:p-6"
                >
                  <th:block th:replace="~{partials/grid-image/image-02 :: *}"></th:block>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-6 py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Image in 3 Grid
                  </h3>
                </div>
                <div
                  class="p-4 border-t border-gray-100 dark:border-gray-800 sm:p-6"
                >
                  <th:block th:replace="~{partials/grid-image/image-03 :: *}"></th:block>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
  </body>
</html>
