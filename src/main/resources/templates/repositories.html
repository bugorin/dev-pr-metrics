<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Repositórios')"></head>
<body th:replace="~{layout :: layout('Repositórios', ~{::section})}">
<section class="page">
    <div class="page__header">
        <div>
            <p class="eyebrow">Fontes</p>
            <h1>Repositórios</h1>
            <p class="subtitle">Cadastre e acompanhe a saúde dos repositórios monitorados.</p>
        </div>
        <div class="actions">
            <button class="btn">Sincronizar</button>
            <button class="btn btn--primary">Adicionar repositório</button>
        </div>
    </div>
    <div class="cards-list">
        <article class="card repo-card">
            <header>
                <div>
                    <p class="label">backend-api</p>
                    <p class="small">github.com/org/backend-api</p>
                </div>
                <span class="badge badge--success">Ativo</span>
            </header>
            <p class="repo-card__stats">PRs semana: 58 · Merge rate: 82% · Tempo médio: 6h</p>
        </article>
        <article class="card repo-card">
            <header>
                <div>
                    <p class="label">frontend-web</p>
                    <p class="small">github.com/org/frontend-web</p>
                </div>
                <span class="badge badge--warning">Sinal amarelo</span>
            </header>
            <p class="repo-card__stats">PRs semana: 34 · Merge rate: 69% · Tempo médio: 11h</p>
        </article>
    </div>
</section>
</body>
</html>
