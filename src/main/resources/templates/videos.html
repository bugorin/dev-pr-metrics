<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head('Videos | TailAdmin - Tailwind CSS Admin Dashboard Template')}">
    <meta charset="UTF-8" />
  </head>
  <body
    x-data="{ page: 'videos', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <th:block th:replace="~{partials/preloader :: *}"></th:block>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <th:block th:replace="~{partials/sidebar :: *}"></th:block>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <th:block th:replace="~{partials/overlay :: *}"></th:block>
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <th:block th:replace="~{partials/header :: *}"></th:block>
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Videos`}">
              <th:block th:replace="~{partials/breadcrumb :: *}"></th:block>
            </div>
            <!-- Breadcrumb End -->
            <div class="grid grid-cols-1 gap-5 sm:gap-6 xl:grid-cols-2">
              <div class="space-y-5 sm:space-y-6">
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 16:9
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <th:block th:replace="~{partials/video/video-01 :: *}"></th:block>
                  </div>
                </div>
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 4:3
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <th:block th:replace="~{partials/video/video-02 :: *}"></th:block>
                  </div>
                </div>
              </div>
              <div class="space-y-5 sm:space-y-6">
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 4:3
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <th:block th:replace="~{partials/video/video-02 :: *}"></th:block>
                  </div>
                </div>
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="px-6 py-5 border-b border-gray-200 dark:border-gray-800"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Video Ratio 1:1
                    </h3>
                  </div>
                  <div class="p-4 sm:p-6">
                    <th:block th:replace="~{partials/video/video-04 :: *}"></th:block>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
  </body>
</html>
