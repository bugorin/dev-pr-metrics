<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Dev PR Metrics</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3" th:text="${title}">Dev PR Metrics</h1>
            <p class="mb-1">Organização: <strong th:text="${organization}">minha-org</strong></p>
            <p class="text-body-secondary mb-4">Data de hoje: <strong th:text="${today}">2026-03-03</strong></p>
            <h2 class="h5 mb-3">Repositórios</h2>

            <div class="alert alert-secondary mb-0" th:if="${#lists.isEmpty(repositories)}">
                Nenhum repositório encontrado.
            </div>

            <ul class="list-group" th:unless="${#lists.isEmpty(repositories)}">
                <li class="list-group-item d-flex flex-column flex-md-row align-items-md-center gap-2"
                    th:each="repo : ${repositories}">
                    <a class="fw-semibold text-decoration-none"
                       th:href="${repo.htmlUrl}"
                       target="_blank"
                       rel="noopener noreferrer"
                       th:text="${repo.name}">repo-name</a>
                    <span class="badge rounded-pill"
                          th:classappend="${repo.isPrivate} ? ' text-bg-warning' : ' text-bg-success'"
                          th:text="${repo.isPrivate} ? 'privado' : 'público'">público</span>
                    <small class="text-body-secondary ms-md-auto"
                           th:text="'branch padrão: ' + ${repo.defaultBranch}">branch padrão: main</small>
                </li>
            </ul>
        </div>
    </div>
</main>
</body>
</html>
